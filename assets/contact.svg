<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Secure contact channel — portfolio, email, linkedin, github, with response SLA and signed-by fingerprint">
  <title>~/contact/secure-channel.card</title>
  <desc>Out-of-band contact panel. Four open channels (portfolio, email, linkedin, github), each with copy-ready handle. SLA pill: response in under 24h. PGP-style signature line at the bottom. Animated handshake light cycles across the channels and the SLA ring counts down on a 24-second loop.</desc>

  <defs>
    <linearGradient id="ct-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#04070d"/>
      <stop offset=".55" stop-color="#08111d"/>
      <stop offset="1"   stop-color="#0a1424"/>
    </linearGradient>
    <linearGradient id="ct-ok" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5cf2c1"/>
      <stop offset="1" stop-color="#79e2ff"/>
    </linearGradient>
    <linearGradient id="ct-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#79e2ff"/>
    </linearGradient>
    <pattern id="ct-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#142036" stroke-width="1"/>
    </pattern>
    <filter id="ct-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <radialGradient id="ct-glow" cx=".5" cy=".5" r=".5">
      <stop offset="0"   stop-color="#5cf2c1" stop-opacity=".55"/>
      <stop offset="1"   stop-color="#5cf2c1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="380" fill="url(#ct-bg)"/>
  <rect width="1200" height="380" fill="url(#ct-grid)" opacity=".22"/>

  <!-- corner ticks -->
  <g stroke="#1f2f4a" stroke-width="1.5" fill="none">
    <path d="M22 22 L22 60 M22 22 L60 22"/>
    <path d="M1178 22 L1140 22 M1178 22 L1178 60"/>
    <path d="M22 358 L22 320 M22 358 L60 358"/>
    <path d="M1178 358 L1140 358 M1178 358 L1178 320"/>
  </g>

  <!-- header bar -->
  <g transform="translate(60 56)" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace">
    <circle r="6" fill="#ff5f57"/>
    <circle cx="20" r="6" fill="#febc2e"/>
    <circle cx="40" r="6" fill="#28c840"/>
    <text x="60" y="5" font-size="12" fill="#54688a" letter-spacing="2">~/contact/secure-channel.card — handshake v1.3 — replay-safe — out-of-band</text>
    <g transform="translate(870 -2)" font-size="11" fill="#5cf2c1">
      <circle r="4" fill="#5cf2c1"><animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
      <text x="10" y="4">channel · OPEN</text>
    </g>
  </g>

  <!-- top section: handshake line -->
  <g transform="translate(60 100)" font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text font-size="10" fill="#54688a" letter-spacing="2">TLS HANDSHAKE</text>

    <!-- client / server tubes -->
    <g transform="translate(0 14)">
      <rect x="0"    y="0" width="120" height="36" rx="6" fill="#04070d" stroke="#1f2f4a"/>
      <text x="60" y="14" text-anchor="middle" font-size="9"  fill="#54688a" letter-spacing="2">YOU</text>
      <text x="60" y="28" text-anchor="middle" font-size="11" fill="#cfd6e4">recruiter</text>

      <rect x="960"  y="0" width="120" height="36" rx="6" fill="#04070d" stroke="#5cf2c1"/>
      <text x="1020" y="14" text-anchor="middle" font-size="9"  fill="#5cf2c1" letter-spacing="2">YASSIR</text>
      <text x="1020" y="28" text-anchor="middle" font-size="11" fill="#cfd6e4">soc-ops</text>

      <!-- wire -->
      <line x1="120" y1="18" x2="960" y2="18" stroke="#1f2f4a" stroke-width="1" stroke-dasharray="4 4"/>

      <!-- handshake messages cycling -->
      <g font-size="10" fill="#79e2ff" text-anchor="middle">
        <text x="540" y="14" opacity="0">
          <tspan>ClientHello → portfolio · stack · case-studies</tspan>
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.05;.27;.32" begin="0s" dur="6.4s" repeatCount="indefinite"/>
        </text>
        <text x="540" y="14" opacity="0">
          <tspan>ServerHello ← yassirzahidi8@gmail.com</tspan>
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.05;.27;.32" begin="1.6s" dur="6.4s" repeatCount="indefinite"/>
        </text>
        <text x="540" y="14" opacity="0">
          <tspan>Certificate ← linkedin.com/in/yassir-zahidi (signed)</tspan>
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.05;.27;.32" begin="3.2s" dur="6.4s" repeatCount="indefinite"/>
        </text>
        <text x="540" y="14" opacity="0">
          <tspan>Finished · ETA &lt; 24h</tspan>
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.05;.27;.32" begin="4.8s" dur="6.4s" repeatCount="indefinite"/>
        </text>
      </g>

      <!-- packet pulse traveling left → right -->
      <circle r="4" fill="#5cf2c1">
        <animate attributeName="cx" values="120;960;960;120;120" keyTimes="0;.4;.5;.9;1" dur="6.4s" repeatCount="indefinite"/>
        <set attributeName="cy" to="18"/>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.05;.45;.55;1" dur="6.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 4-channel grid -->
  <g transform="translate(60 168)" font-family="ui-monospace, 'JetBrains Mono', monospace">

    <!-- channel 1: portfolio -->
    <g transform="translate(0 0)">
      <rect width="260" height="92" rx="10" fill="#04070d" stroke="#5cf2c1" opacity=".95"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#5cf2c1"/>
      <text x="20" y="22" font-size="10"  fill="#54688a" letter-spacing="2">01 · WEB</text>
      <text x="20" y="44" font-size="14"  fill="#5cf2c1" font-weight="700">portfolio</text>
      <text x="20" y="64" font-size="11"  fill="#cfd6e4">y-zahidi.github.io</text>
      <text x="20" y="80" font-size="9"   fill="#54688a">200 OK · TLS · CSP-safe · auto-deploy on push</text>
      <g transform="translate(244 16)">
        <circle r="4" fill="#5cf2c1"><animate attributeName="opacity" values="1;.3;1" dur="1.4s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- channel 2: email -->
    <g transform="translate(280 0)">
      <rect width="260" height="92" rx="10" fill="#04070d" stroke="#79e2ff" opacity=".95"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#79e2ff"/>
      <text x="20" y="22" font-size="10"  fill="#54688a" letter-spacing="2">02 · MAIL</text>
      <text x="20" y="44" font-size="14"  fill="#79e2ff" font-weight="700">email</text>
      <text x="20" y="64" font-size="11"  fill="#cfd6e4">yassirzahidi8@gmail.com</text>
      <text x="20" y="80" font-size="9"   fill="#54688a">SPF · DKIM · DMARC=quarantine · responds &lt; 24h</text>
      <g transform="translate(244 16)">
        <circle r="4" fill="#79e2ff"><animate attributeName="opacity" values="1;.3;1" dur="1.4s" begin=".35s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- channel 3: linkedin -->
    <g transform="translate(560 0)">
      <rect width="260" height="92" rx="10" fill="#04070d" stroke="#a78bfa" opacity=".95"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#a78bfa"/>
      <text x="20" y="22" font-size="10"  fill="#54688a" letter-spacing="2">03 · NET</text>
      <text x="20" y="44" font-size="14"  fill="#a78bfa" font-weight="700">linkedin</text>
      <text x="20" y="64" font-size="11"  fill="#cfd6e4">in/yassir-zahidi</text>
      <text x="20" y="80" font-size="9"   fill="#54688a">verified · open to roles · EU / Morocco / remote</text>
      <g transform="translate(244 16)">
        <circle r="4" fill="#a78bfa"><animate attributeName="opacity" values="1;.3;1" dur="1.4s" begin=".7s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- channel 4: github -->
    <g transform="translate(840 0)">
      <rect width="240" height="92" rx="10" fill="#04070d" stroke="#cfd6e4" opacity=".95"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#cfd6e4"/>
      <text x="20" y="22" font-size="10"  fill="#54688a" letter-spacing="2">04 · CODE</text>
      <text x="20" y="44" font-size="14"  fill="#cfd6e4" font-weight="700">github</text>
      <text x="20" y="64" font-size="11"  fill="#cfd6e4">y-zahidi</text>
      <text x="20" y="80" font-size="9"   fill="#54688a">10 public repos · 6 stars · all signed</text>
      <g transform="translate(224 16)">
        <circle r="4" fill="#cfd6e4"><animate attributeName="opacity" values="1;.3;1" dur="1.4s" begin="1.05s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- handshake light sweeping the four cards -->
    <g>
      <rect x="0" y="0" width="260" height="92" rx="10" fill="url(#ct-glow)" opacity=".0">
        <animate attributeName="opacity" values=".55;0" dur="3.2s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <rect x="280" y="0" width="260" height="92" rx="10" fill="url(#ct-glow)" opacity=".0">
        <animate attributeName="opacity" values=".55;0" dur="3.2s" begin=".8s" repeatCount="indefinite"/>
      </rect>
      <rect x="560" y="0" width="260" height="92" rx="10" fill="url(#ct-glow)" opacity=".0">
        <animate attributeName="opacity" values=".55;0" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="840" y="0" width="240" height="92" rx="10" fill="url(#ct-glow)" opacity=".0">
        <animate attributeName="opacity" values=".55;0" dur="3.2s" begin="2.4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- SLA + signature row -->
  <g transform="translate(60 286)" font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="0" y="0" width="1080" height="60" rx="8" fill="#04070d" opacity=".55" stroke="#1f2f4a"/>

    <!-- SLA donut on the left -->
    <g transform="translate(28 30)">
      <circle r="20" fill="none" stroke="#1f2f4a" stroke-width="3"/>
      <circle r="20" fill="none" stroke="url(#ct-ok)" stroke-width="3" stroke-linecap="round"
              stroke-dasharray="125.6" stroke-dashoffset="0" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" values="125.6;0;125.6" dur="8s" repeatCount="indefinite"/>
      </circle>
      <text text-anchor="middle" y="4" font-size="10" fill="#5cf2c1">&lt;24h</text>
    </g>
    <g transform="translate(60 22)">
      <text font-size="10" fill="#54688a" letter-spacing="2">RESPONSE SLA</text>
      <text y="22" font-size="11" fill="#cfd6e4">first response within 24 h · time zone Africa/Casablanca · async-first</text>
    </g>

    <!-- signature on the right -->
    <g transform="translate(560 22)">
      <text font-size="10" fill="#54688a" letter-spacing="2">SIGNED BY</text>
      <text y="22" font-size="11" fill="#5cf2c1" font-family="ui-monospace, monospace">Y4ssir-Z4hidi · 9F4C 7B12 6A03 D8E5 · valid · 2026-current</text>
    </g>
  </g>

  <!-- bottom right tag -->
  <text x="1140" y="368" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="#54688a" letter-spacing="2">
    contact · web → mail → net → code · all channels open
  </text>
</svg>
