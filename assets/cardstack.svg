<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Three discipline cards — BLUE (defense), RED (offense), PURPLE (validation loop)">
  <title>blue · red · purple — yassir zahidi</title>
  <desc>Three trading-style cards summarising the disciplines I work across: BLUE — defense (Wazuh, Suricata, Sysmon, MISP); RED — offense (nmap, BloodHound, Burp, Metasploit); PURPLE — validation loop (atomic-red-team, sigma, caldera). Each card carries three stats and a pulsing status LED.</desc>
  <defs>
    <!-- card background gradient -->
    <linearGradient id="cardbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f141c"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="bluestripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cf2c1" stop-opacity="0"/>
      <stop offset=".5" stop-color="#5cf2c1" stop-opacity=".55"/>
      <stop offset="1" stop-color="#38c1ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redstripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b8b" stop-opacity="0"/>
      <stop offset=".5" stop-color="#ff6b8b" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ff7a99" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="purplestripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset=".5" stop-color="#a78bfa" stop-opacity=".55"/>
      <stop offset="1" stop-color="#c79bff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 20 L20 20 M20 0 L20 20" stroke="#1a1f29" stroke-width=".5" fill="none"/>
    </pattern>
    <symbol id="led" overflow="visible">
      <circle r="3.5" fill="currentColor"/>
      <circle r="3.5" fill="currentColor" opacity=".4">
        <animate attributeName="r" values="3.5;9;3.5" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".5;0;.5" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </symbol>
    <symbol id="shield" viewBox="0 0 60 60" overflow="visible">
      <path d="M30 6 L52 14 L52 30 Q52 48 30 56 Q8 48 8 30 L8 14 Z"
            fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M22 30 L28 36 L40 22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="crosshair" viewBox="0 0 60 60" overflow="visible">
      <circle cx="30" cy="30" r="20" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="30" cy="30" r="4" fill="currentColor"/>
      <line x1="30" y1="2" x2="30" y2="14" stroke="currentColor" stroke-width="2"/>
      <line x1="30" y1="46" x2="30" y2="58" stroke="currentColor" stroke-width="2"/>
      <line x1="2" y1="30" x2="14" y2="30" stroke="currentColor" stroke-width="2"/>
      <line x1="46" y1="30" x2="58" y2="30" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <symbol id="loop" viewBox="0 0 60 60" overflow="visible">
      <path d="M14 30 A16 16 0 1 1 30 46" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 46 L24 40 M30 46 L36 40" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M46 30 A16 16 0 1 1 30 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" opacity=".55"/>
      <path d="M30 14 L36 20 M30 14 L24 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" opacity=".55"/>
    </symbol>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="380" fill="#0a0e14"/>
  <rect width="1200" height="380" fill="url(#grid)" opacity=".5"/>

  <!-- top stripe -->
  <text x="20" y="22" fill="#5b6478" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" letter-spacing="2">YZ-2026 · OPEN · MOROCCO · EU · REMOTE</text>
  <text x="1180" y="22" text-anchor="end" fill="#5b6478" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" letter-spacing="2">blue · red · purple</text>

  <!-- ====================================================== -->
  <!-- BLUE CARD                                                -->
  <!-- ====================================================== -->
  <g transform="translate(20,40)">
    <rect width="380" height="320" rx="10" fill="url(#cardbg)" stroke="#5cf2c1" stroke-opacity=".55"/>
    <!-- top accent stripe -->
    <rect width="380" height="3" fill="url(#bluestripe)" rx="1"/>
    <!-- scanline -->
    <rect width="380" height="2" y="0" fill="#5cf2c1" opacity=".18">
      <animate attributeName="y" values="0;320;0" dur="9s" repeatCount="indefinite"/>
    </rect>
    <!-- header -->
    <text x="20" y="36" fill="#5cf2c1" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" letter-spacing="6">BLUE · DEFENSE</text>
    <g transform="translate(360,30)" color="#5cf2c1"><use href="#led"/></g>

    <!-- glyph -->
    <g transform="translate(20,60)" color="#5cf2c1"><use href="#shield" width="60" height="60"/></g>
    <text x="100" y="86" fill="#cfd6e4" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">detect · respond</text>
    <text x="100" y="106" fill="#7d889e" font-family="Inter,system-ui,sans-serif" font-size="12">build the rule before the alert.</text>

    <!-- stats -->
    <g transform="translate(20,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">RULES SHIPPED</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">
        <tspan>47</tspan>
        <animate attributeName="opacity" values="1;.4;1" dur="2.4s" begin="0s" repeatCount="indefinite"/>
      </text>
      <text fill="#5cf2c1" font-size="10" y="22" x="80">+1 today</text>
    </g>
    <g transform="translate(160,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">MTTD MEDIAN</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">1.7s</text>
    </g>
    <g transform="translate(280,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">UPTIME 7d</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">99.4%</text>
    </g>

    <!-- progress bar - coverage -->
    <g transform="translate(20,200)">
      <text fill="#7d889e" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="1">MITRE ATT&amp;CK COVERAGE</text>
      <rect y="10" width="340" height="6" rx="3" fill="#11161e"/>
      <rect y="10" width="0" height="6" rx="3" fill="#5cf2c1">
        <animate attributeName="width" from="0" to="218" dur="1.6s" begin="0s" fill="freeze"/>
      </rect>
      <text x="340" y="34" text-anchor="end" fill="#5cf2c1" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">64% · 38/59 techniques</text>
    </g>

    <!-- chips -->
    <g transform="translate(20,250)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
      <g><rect width="60" height="22" rx="11" fill="#11161e" stroke="#1f2f4a"/><text x="30" y="15" text-anchor="middle" fill="#79e2ff">wazuh</text></g>
      <g transform="translate(70,0)"><rect width="74" height="22" rx="11" fill="#11161e" stroke="#1f2f4a"/><text x="37" y="15" text-anchor="middle" fill="#79e2ff">suricata</text></g>
      <g transform="translate(154,0)"><rect width="66" height="22" rx="11" fill="#11161e" stroke="#1f2f4a"/><text x="33" y="15" text-anchor="middle" fill="#79e2ff">sysmon</text></g>
      <g transform="translate(230,0)"><rect width="50" height="22" rx="11" fill="#11161e" stroke="#1f2f4a"/><text x="25" y="15" text-anchor="middle" fill="#79e2ff">misp</text></g>
      <g transform="translate(290,0)"><rect width="78" height="22" rx="11" fill="#11161e" stroke="#1f2f4a"/><text x="39" y="15" text-anchor="middle" fill="#79e2ff">fortigate</text></g>
    </g>
    <text x="20" y="305" fill="#5b6478" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2">ROLE · ENGINEER · BUILDER · LEARNER</text>
  </g>

  <!-- ====================================================== -->
  <!-- RED CARD                                                 -->
  <!-- ====================================================== -->
  <g transform="translate(420,40)">
    <rect width="380" height="320" rx="10" fill="url(#cardbg)" stroke="#ff6b8b" stroke-opacity=".55"/>
    <rect width="380" height="3" fill="url(#redstripe)" rx="1"/>
    <rect width="380" height="2" y="0" fill="#ff6b8b" opacity=".18">
      <animate attributeName="y" values="0;320;0" dur="9s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="36" fill="#ff6b8b" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" letter-spacing="6">RED · OFFENSE</text>
    <g transform="translate(360,30)" color="#ff6b8b"><use href="#led"/></g>

    <g transform="translate(20,60)" color="#ff6b8b"><use href="#crosshair" width="60" height="60">
      <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="20s" repeatCount="indefinite"/>
    </use></g>
    <text x="100" y="86" fill="#cfd6e4" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">recon · exploit</text>
    <text x="100" y="106" fill="#7d889e" font-family="Inter,system-ui,sans-serif" font-size="12">break the rule i wrote yesterday.</text>

    <g transform="translate(20,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">HTB · THM ROOMS</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">52</text>
      <text fill="#ff6b8b" font-size="10" y="22" x="42">+2 wk</text>
    </g>
    <g transform="translate(160,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">OSCP TRACK</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">68%</text>
    </g>
    <g transform="translate(280,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">CVE STUDIES</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">14</text>
    </g>

    <!-- mini killchain dots -->
    <g transform="translate(20,200)">
      <text fill="#7d889e" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="1">KILL-CHAIN COMFORT</text>
      <g transform="translate(0,18)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9">
        <g><circle cx="8" cy="8" r="7" fill="#ff6b8b"/><text x="22" y="11" fill="#cfd6e4">recon</text></g>
        <g transform="translate(64,0)"><circle cx="8" cy="8" r="7" fill="#ff6b8b"/><text x="22" y="11" fill="#cfd6e4">access</text></g>
        <g transform="translate(132,0)"><circle cx="8" cy="8" r="7" fill="#ff6b8b"/><text x="22" y="11" fill="#cfd6e4">privesc</text></g>
        <g transform="translate(202,0)"><circle cx="8" cy="8" r="7" fill="#ff6b8b" opacity=".75"/><text x="22" y="11" fill="#cfd6e4">lateral</text></g>
        <g transform="translate(270,0)"><circle cx="8" cy="8" r="7" fill="#ff6b8b" opacity=".55"/><text x="22" y="11" fill="#cfd6e4" opacity=".7">exfil</text></g>
      </g>
    </g>

    <g transform="translate(20,250)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
      <g><rect width="46" height="22" rx="11" fill="#11161e" stroke="#2a1a22"/><text x="23" y="15" text-anchor="middle" fill="#ff7a99">nmap</text></g>
      <g transform="translate(56,0)"><rect width="46" height="22" rx="11" fill="#11161e" stroke="#2a1a22"/><text x="23" y="15" text-anchor="middle" fill="#ff7a99">burp</text></g>
      <g transform="translate(112,0)"><rect width="78" height="22" rx="11" fill="#11161e" stroke="#2a1a22"/><text x="39" y="15" text-anchor="middle" fill="#ff7a99">metasploit</text></g>
      <g transform="translate(200,0)"><rect width="92" height="22" rx="11" fill="#11161e" stroke="#2a1a22"/><text x="46" y="15" text-anchor="middle" fill="#ff7a99">bloodhound</text></g>
      <g transform="translate(302,0)"><rect width="58" height="22" rx="11" fill="#11161e" stroke="#2a1a22"/><text x="29" y="15" text-anchor="middle" fill="#ff7a99">crackmap</text></g>
    </g>
    <text x="20" y="305" fill="#5b6478" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2">PRACTICE · LAB · CTF · SELF-PENTEST</text>
  </g>

  <!-- ====================================================== -->
  <!-- PURPLE CARD                                              -->
  <!-- ====================================================== -->
  <g transform="translate(820,40)">
    <rect width="380" height="320" rx="10" fill="url(#cardbg)" stroke="#a78bfa" stroke-opacity=".55"/>
    <rect width="380" height="3" fill="url(#purplestripe)" rx="1"/>
    <rect width="380" height="2" y="0" fill="#a78bfa" opacity=".18">
      <animate attributeName="y" values="0;320;0" dur="9s" begin="6s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="36" fill="#a78bfa" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" letter-spacing="6">PURPLE · LOOP</text>
    <g transform="translate(360,30)" color="#a78bfa"><use href="#led"/></g>

    <g transform="translate(20,60)" color="#a78bfa"><use href="#loop" width="60" height="60">
      <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="14s" repeatCount="indefinite"/>
    </use></g>
    <text x="100" y="86" fill="#cfd6e4" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">attack · tune · ship</text>
    <text x="100" y="106" fill="#7d889e" font-family="Inter,system-ui,sans-serif" font-size="12">every red find = a new blue rule.</text>

    <g transform="translate(20,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">RED→BLUE CLOSURES</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">22</text>
    </g>
    <g transform="translate(160,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">ATOMIC TESTS</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">31</text>
    </g>
    <g transform="translate(280,140)" font-family="ui-monospace,Menlo,Consolas,monospace">
      <text fill="#7d889e" font-size="10" y="0" letter-spacing="1">CYCLE TIME</text>
      <text fill="#cfd6e4" font-size="22" font-weight="700" y="22">~24h</text>
    </g>

    <!-- 6 stage cycle -->
    <g transform="translate(20,200)">
      <text fill="#7d889e" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="1">VALIDATION CYCLE</text>
      <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9.5" transform="translate(0,18)">
        <text x="0" y="11" fill="#a78bfa">hypothesise</text>
        <text x="74" y="11" fill="#5b6478">→</text>
        <text x="86" y="11" fill="#a78bfa">emulate</text>
        <text x="138" y="11" fill="#5b6478">→</text>
        <text x="150" y="11" fill="#a78bfa">observe</text>
        <text x="0" y="28" fill="#a78bfa">tune</text>
        <text x="36" y="28" fill="#5b6478">→</text>
        <text x="48" y="28" fill="#a78bfa">re-fire</text>
        <text x="98" y="28" fill="#5b6478">→</text>
        <text x="110" y="28" fill="#a78bfa">document</text>
      </g>
      <!-- traveling dot following the cycle conceptually -->
      <circle cx="0" cy="-2" r="2.5" fill="#a78bfa">
        <animate attributeName="cx" values="6;82;146;200;6;52;108;6" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="14;14;14;14;31;31;31;14" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(20,250)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
      <g><rect width="86" height="22" rx="11" fill="#11161e" stroke="#1d1a2c"/><text x="43" y="15" text-anchor="middle" fill="#c79bff">atomic-rt</text></g>
      <g transform="translate(96,0)"><rect width="50" height="22" rx="11" fill="#11161e" stroke="#1d1a2c"/><text x="25" y="15" text-anchor="middle" fill="#c79bff">sigma</text></g>
      <g transform="translate(156,0)"><rect width="58" height="22" rx="11" fill="#11161e" stroke="#1d1a2c"/><text x="29" y="15" text-anchor="middle" fill="#c79bff">caldera</text></g>
      <g transform="translate(224,0)"><rect width="90" height="22" rx="11" fill="#11161e" stroke="#1d1a2c"/><text x="45" y="15" text-anchor="middle" fill="#c79bff">jupyter-nb</text></g>
    </g>
    <text x="20" y="305" fill="#5b6478" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2">METHOD · DOCUMENT · REHEARSE</text>
  </g>
</svg>
