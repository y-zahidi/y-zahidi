name: Generate metrics SVGs

# Runs once on push to main, then on a daily cron, then on demand.
# Renders four self-contained SVGs into the repo and commits them on the
# default branch. The README references the committed files directly, so the
# profile no longer depends on github-readme-stats.vercel.app being up.

on:
  push:
    branches: [main]
    paths: [".github/workflows/metrics.yml"]
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. The classic "language + commit" stats card
  # ────────────────────────────────────────────────────────────
  metrics-overview:
    name: Stats overview card
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          user: y-zahidi
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Casablanca
          config_padding: 0, 8 + 11%
          base_indepth: yes
          base_skip: yes

  # ────────────────────────────────────────────────────────────
  # 2. Top languages, isometric calendar, achievements
  # ────────────────────────────────────────────────────────────
  metrics-plugins:
    name: Plugin-rich card (languages + isocalendar + achievements)
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugins.svg
          user: y-zahidi
          template: classic
          base: ""
          config_timezone: Africa/Casablanca
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          plugin_followup: yes
          plugin_followup_sections: repositories, user
